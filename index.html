const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const nowISO = () => new Date().toISOString();
const fmtDT = (iso) => { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); };
const fmtMonth = (iso) => iso ? iso.slice(0,7) : '';
const curMonth = () => new Date().toISOString().slice(0,7);
const slug = (s) => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,16);
const money = (n) => (Math.round(n||0)).toLocaleString('fr-FR') + ' FCFA';
function haversine(lat1,lng1,lat2,lng2){
  if([lat1,lng1,lat2,lng2].some(v=>v===null||v===undefined||isNaN(v))) return null;
  const R=6371, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3200);
}
function esc(s){ return (s??'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

}

/* ================= ALERTES SONORES ADMIN (ambulance hors service trop longtemps) ================= */
let ADMIN_ALERTS_ENABLED = false;
let AUDIO_CTX = null;
let ALERTED_AMB_IDS = new Set();
const AMB_ALARM_MS = 60*60*1000; // 1h
function unlockAudio(){
  try{
    AUDIO_CTX = AUDIO_CTX || new (window.AudioContext||window.webkitAudioContext)();
    if(AUDIO_CTX.state==='suspended') AUDIO_CTX.resume();
  }catch(e){}
}
function playAlarmSound(){
  try{
    unlockAudio();
    if(!AUDIO_CTX) return;
    const now = AUDIO_CTX.currentTime;
    [0,0.55,1.1,1.65].forEach(offset=>{
      [880,660].forEach((freq,i)=>{
        const osc = AUDIO_CTX.createOscillator();
        const gain = AUDIO_CTX.createGain();
        osc.frequency.value = freq; osc.type = 'square';
        gain.gain.value = 0.15;
        osc.connect(gain); gain.connect(AUDIO_CTX.destination);
        const t0 = now+offset+i*0.27;
        osc.start(t0); osc.stop(t0+0.24);
      });
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
}
function notifyBrowser(title, body){
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification(title, {body}); }catch(e){}
  }
}
const CALL_GEOFENCE_METERS = 10;
function withinCentreGeofence(centre, lat, lng){
  if(centre?.lat==null || centre?.lng==null) return {ok:false, reason:'noref', distM:null};
  const distKm = haversine(centre.lat, centre.lng, lat, lng);
  if(distKm==null) return {ok:false, reason:'nodist', distM:null};
  const distM = distKm*1000;
  return {ok: distM <= CALL_GEOFENCE_METERS, distM};
}
function checkAmbAlarms(){
  const u = currentUser();
  if(!u || u.role!=='admin') return;
  const now = Date.now();
  const active = new Set();
  DB.ambulances.forEach(a=>{
    if(a.statut==='en_mission' && a.statutDepuis){
      const elapsed = now - new Date(a.statutDepuis).getTime();
      if(elapsed > AMB_ALARM_MS){
        active.add(a.id);
        if(ADMIN_ALERTS_ENABLED && !ALERTED_AMB_IDS.has(a.id)){
          playAlarmSound();
          notifyBrowser('Ambulance en mission prolongée', a.nom+' — en mission depuis plus d\u20191h sans résolution.');
        }
      }
    }
  });
  ALERTED_AMB_IDS = active;
}

/* ================= STOCKAGE PARTAGE (Google Sheets via Google Apps Script) ================= */
/* Remplacez la valeur ci-dessous par l'URL de déploiement de votre Apps Script (se termine par /exec).
   Tant qu'elle n'est pas renseignée, l'application utilise le stockage intégré (window.storage) —
   pratique pour tester ici, mais qui ne fonctionne que dans cette conversation Claude. */
const API_URL = "https://script.google.com/macros/s/AKfycbw-s_AFiWgBfcW8ItPEvnotEQyBmZ2qD6MSLQsIfKbUiteF6OS1gtM-Ajz9pt0UEWfzYw/exec";
const USE_SHEETS = API_URL && API_URL.indexOf('http') === 0;

const KEYS = ['centres','users','ambulances','courses','appels','finances','depenses','settings'];
let DB = { centres:[], users:[], ambulances:[], courses:[], appels:[], finances:{}, depenses:[], settings:{} };
let VERSIONS = {};
let LAST_STORAGE_ERROR = null;

async function apiGet(key){
  const res = await fetch(API_URL + '?action=get&key=' + encodeURIComponent(key));
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  return data.value;
}
async function apiSet(key, value){
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // évite le préflight CORS que Apps Script ne gère pas
    body: JSON.stringify({action:'set', key, value})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
}

async function loadKey(k){
  try{
    if(USE_SHEETS){
      const v = await apiGet(k);
      if(v){ DB[k] = JSON.parse(v); }
    } else if(window.storage){
      const r = await window.storage.get(k, true);
      if(r && r.value){ DB[k] = JSON.parse(r.value); }
    }
  }catch(e){ LAST_STORAGE_ERROR = e.message; console.error('load failed', k, e); }
}
async function loadAll(){ await Promise.all(KEYS.map(k=>loadKey(k))); }
async function saveKey(k){
  try{
    if(USE_SHEETS){ await apiSet(k, JSON.stringify(DB[k])); }
    else if(window.storage){ await window.storage.set(k, JSON.stringify(DB[k]), true); }
    else { throw new Error('Aucun stockage configuré'); }
  }
  catch(e){ console.error('storage set failed', k, e); toast("Sauvegarde impossible (connexion ou configuration du stockage) — réessayez."); }
}

function buildSeed(){
  const centres = CENTRES_SOURCE.map(([commune,arrondissement,nom],i)=>({
    id:'c'+(i+1),
    commune, arrondissement, nom,
    type: nom.startsWith('HZ') ? 'HZ' : (nom.startsWith('MI') ? 'MI' : 'CS'),
    reference: nom.startsWith('HZ'),
    lat:null, lng:null
  }));
  const hz = centres.find(c=>c.reference) || centres[0];

  const users = [];
  centres.forEach(c=>{
    const base = slug(c.nom) || c.id;
    users.push({
      id:'u_'+c.id, role:'agent', nom:'Agent — '+c.nom, identifiant:base,
      motDePasse: base.slice(0,6)+'2026', centreId:c.id, telephone:''
    });
  });
  ['AMB-01','AMB-02','AMB-03'].forEach((nomAmb,i)=>{
    users.push({
      id:'u_amb'+(i+1), role:'ambulancier', nom:'Chauffeur '+nomAmb, identifiant:'ambulancier'+(i+1),
      motDePasse:'Ambu'+(i+1)+'2026', ambulanceId:'a'+(i+1), telephone:'',
      sessionToken:null, sessionLastSeen:null, handoffRequest:null
    });
  });
  users.push({id:'u_gest', role:'gestionnaire', nom:'Gestionnaire matières', identifiant:'gestionnaire', motDePasse:'Materiel2026', telephone:''});
  users.push({id:'u_admin', role:'admin', nom:'Administrateur principal', identifiant:'admin', motDePasse:'Admin2026!', telephone:''});

  const ambulances = ['AMB-01','AMB-02','AMB-03'].map((nom,i)=>({
    id:'a'+(i+1), nom, immatriculation:'', telephone:'', conducteur:'Chauffeur '+nom,
    statut:'disponible', statutDepuis:nowISO(), lat:null, lng:null, lastUpdate:null,
    garageCentreId: hz.id, consommation:12, coursActuelle:null
  }));

  return {
    centres, users, ambulances,
    courses:[], appels:[], depenses:[],
    finances:{},
    settings:{ taux3pct:0.03, prixCarburantLitre:750, consoDefaut:12 }
  };
}

async function initIfEmpty(){
  await loadAll();
  if(!DB.centres || DB.centres.length===0){
    const seed = buildSeed();
    DB = seed;
    for(const k of KEYS){ await saveKey(k); }
    toast('Base initialisée avec les 36 formations sanitaires de la ZS DAA.');
  }
  await migrateData();
}

async function migrateData(){
  let changed = false;
  const communes = [...new Set(DB.centres.map(c=>c.commune))];
  DB.centres.forEach(c=>{
    if(!DB.users.some(x=>x.role==='chef_poste' && x.centreId===c.id)){
      const base = 'cp'+(slug(c.nom) || c.id);
      DB.users.push({
        id:'u_cp_'+c.id, role:'chef_poste', nom:'Chef de poste — '+c.nom, identifiant:base,
        motDePasse: base+'2026', centreId:c.id, telephone:''
      });
      changed = true;
    }
  });
  communes.forEach(com=>{
    if(!DB.users.some(x=>x.role==='raf' && x.commune===com)){
      const base = 'raf'+slug(com);
      DB.users.push({
        id:'u_raf_'+slug(com), role:'raf', nom:'RAF — '+com, identifiant:base,
        motDePasse: base+'2026', commune:com, telephone:''
      });
      changed = true;
    }
  });
  DB.users.forEach(u=>{
    if(u.role==='ambulancier'){
      if(u.sessionToken===undefined){ u.sessionToken=null; changed=true; }
      if(u.sessionLastSeen===undefined){ u.sessionLastSeen=null; changed=true; }
      if(u.handoffRequest===undefined){ u.handoffRequest=null; changed=true; }
    }
  });
  let ambChanged = false;
  DB.ambulances.forEach(a=>{ if(a.statutDepuis===undefined){ a.statutDepuis = nowISO(); ambChanged=true; } });
  if(changed) await saveKey('users');
  if(ambChanged) await saveKey('ambulances');
}

function currentUser(){ return DB.users.find(u=>u.id===SESSION?.userId) || null; }
function centreOf(id){ return DB.centres.find(c=>c.id===id); }
function ambulanceOf(id){ return DB.ambulances.find(a=>a.id===id); }

/* ================= RENDU PRINCIPAL ================= */
async function boot(){
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="logo">${AMBULANCE_ICON_SVG}</div>
      <p class="muted" style="margin-top:18px;">Chargement des données depuis Google Sheets…</p>
      <p class="hint" style="margin-top:6px;">Peut prendre quelques secondes lors du premier accès.</p>
    </div>`;
  await initIfEmpty();
  render();
  POLL_TIMER = setInterval(async ()=>{
    if(!SESSION) return;
    if(document.querySelector('.no-poll')) return;
    await Promise.all([loadKey('ambulances'), loadKey('appels'), loadKey('courses'), loadKey('centres'), loadKey('users')]);
    if(SESSION.role==='ambulancier'){
      const u = currentUser();
      if(!u){ return; }
      if(u.sessionToken && u.sessionToken!==MY_SESSION_TOKEN){
        stopGeoWatch();
        SESSION=null; VIEW='login'; SUBVIEW=null; SHOW_ACCOUNT=false; MY_SESSION_TOKEN=null; INCOMING_HANDOFF=null;
        toast('Déconnecté(e) : ce compte a été ouvert sur un autre appareil.');
        render();
        return;
      }
      u.sessionToken = MY_SESSION_TOKEN; u.sessionLastSeen = nowISO();
      if(u.handoffRequest && u.handoffRequest.status==='pending'){
        if(!INCOMING_HANDOFF || INCOMING_HANDOFF.requestId!==u.handoffRequest.requestId){
          INCOMING_HANDOFF = {...u.handoffRequest};
          playAlarmSound();
          notifyBrowser('Demande de connexion', 'Un autre appareil demande à se connecter à votre compte ambulancier.');
        }
      } else {
        INCOMING_HANDOFF = null;
      }
      await saveKey('users');
    }
    if(SESSION.role==='admin') checkAmbAlarms();
    render();
  }, 15000);
}

let SHOW_ACCOUNT = false;
function render(){
  const el = document.getElementById('app');
  if(!SESSION){
    if(HANDOFF_WAITING){ el.innerHTML = renderHandoffWaiting(); attachHandoffWaitingEvents(); return; }
    el.innerHTML = renderLogin(); attachLoginEvents(); return;
  }
  const u = currentUser();
  if(!u){ SESSION=null; el.innerHTML = renderLogin(); attachLoginEvents(); return; }
  const handoffBanner = (INCOMING_HANDOFF && u.role==='ambulancier') ? renderHandoffIncoming() : '';
  el.innerHTML = renderTopbar(u) + handoffBanner + (SHOW_ACCOUNT ? renderMonCompte(u) : renderBody(u));
  attachBodyEvents(u);
  if(SHOW_ACCOUNT) attachMonCompteEvents(u);
}

/* ---------- LOGIN ---------- */
function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="logo">${AMBULANCE_ICON_SVG}</div>
    <h2 style="margin:0 0 4px;">Référence — Zone sanitaire Djidja-Abomey-Agbangnizoun</h2>
    <p class="muted">Gestion des évacuations sanitaires et du système de référence</p>
    <div class="card" style="text-align:left; margin-top:22px;">
      <label>Identifiant</label>
      <input type="text" id="loginId" placeholder="ex : admin, gestionnaire, ambulancier1...">
      <label>Mot de passe</label>
      <input type="password" id="loginPw">
      <div id="loginErr" class="muted" style="color:var(--red); display:none; margin-bottom:8px;"></div>
      <button class="btn primary" id="loginBtn" style="width:100%;">Se connecter</button>
    </div>
    <p class="small muted" style="margin-top:16px;">Chaque centre dispose d'un compte agent (identifiant = nom du centre simplifié). Demandez vos identifiants à l'administrateur si besoin.</p>
  </div>`;
}
function attachLoginEvents(){
  const btn = document.getElementById('loginBtn');
  btn.onclick = async ()=>{
    const id = document.getElementById('loginId').value.trim().toLowerCase();
    const pw = document.getElementById('loginPw').value;
    const err = document.getElementById('loginErr');
    err.style.display='none';
    const u = DB.users.find(x=>x.identifiant.toLowerCase()===id && x.motDePasse===pw);
    if(!u){ err.style.display='block'; err.textContent='Identifiant ou mot de passe incorrect.'; return; }

    if(u.role==='ambulancier'){
      btn.disabled = true; btn.textContent = 'Connexion…';
      await loadKey('users'); // relit l'état le plus récent avant de vérifier le verrou d'appareil
      const fresh = DB.users.find(x=>x.id===u.id) || u;
      const locked = fresh.sessionToken && fresh.sessionLastSeen && (Date.now()-new Date(fresh.sessionLastSeen).getTime() < SESSION_LOCK_MS);
      if(locked){
        // au lieu de refuser, on envoie une demande de passation de poste à l'appareil déjà connecté
        const requestId = uid();
        fresh.handoffRequest = {requestId, requestedAt: nowISO(), status:'pending'};
        await saveKey('users');
        btn.disabled=false; btn.textContent='Se connecter';
        HANDOFF_WAITING = {userId: fresh.id, requestId, startedAt: Date.now()};
        render();
        startHandoffPolling();
        return;
      }
      MY_SESSION_TOKEN = uid();
      fresh.sessionToken = MY_SESSION_TOKEN;
      fresh.sessionLastSeen = nowISO();
      fresh.handoffRequest = null;
      await saveKey('users');
      btn.disabled=false; btn.textContent='Se connecter';
    }

    SESSION = {userId:u.id, role:u.role};
    VIEW = u.role;
    render();
    if(u.role==='ambulancier'){
      const amb = ambulanceOf(u.ambulanceId);
      if(amb) startGeoWatch(amb);
    }
  };
  document.getElementById('loginPw').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
}

/* ---------- PASSATION DE POSTE (verrou ambulancier) ---------- */
function renderHandoffWaiting(){
  return `
  <div class="login-wrap">
    <div class="logo">${AMBULANCE_ICON_SVG}</div>
    <h2 style="margin:0 0 4px;">Demande envoyée</h2>
    <p class="muted">Ce compte est actuellement utilisé sur un autre appareil. Une demande d'autorisation lui a été envoyée — patientez…</p>
    <div class="card" style="text-align:left; margin-top:22px;">
      <p class="muted small" id="handoffStatusText">En attente de réponse…</p>
      <button class="btn" id="handoffCancelBtn" style="width:100%;">Annuler la demande</button>
    </div>
  </div>`;
}
function attachHandoffWaitingEvents(){
  const cancelBtn = document.getElementById('handoffCancelBtn');
  if(cancelBtn) cancelBtn.onclick = async ()=>{
    stopHandoffPolling();
    if(HANDOFF_WAITING){
      await loadKey('users');
      const u = DB.users.find(x=>x.id===HANDOFF_WAITING.userId);
      if(u && u.handoffRequest && u.handoffRequest.requestId===HANDOFF_WAITING.requestId){ u.handoffRequest=null; await saveKey('users'); }
    }
    HANDOFF_WAITING = null;
    render();
  };
}
function startHandoffPolling(){
  stopHandoffPolling();
  HANDOFF_POLL_TIMER = setInterval(async ()=>{
    if(!HANDOFF_WAITING){ stopHandoffPolling(); return; }
    await loadKey('users');
    const u = DB.users.find(x=>x.id===HANDOFF_WAITING.userId);
    if(!u){ stopHandoffPolling(); HANDOFF_WAITING=null; render(); return; }
    const req = u.handoffRequest;
    if(!req || req.requestId!==HANDOFF_WAITING.requestId){
      stopHandoffPolling(); toast('La demande a expiré.'); HANDOFF_WAITING=null; render(); return;
    }
    if(req.status==='approved'){
      stopHandoffPolling();
      MY_SESSION_TOKEN = uid();
      u.sessionToken = MY_SESSION_TOKEN; u.sessionLastSeen = nowISO(); u.handoffRequest = null;
      await saveKey('users');
      SESSION = {userId:u.id, role:u.role}; VIEW='ambulancier';
      HANDOFF_WAITING = null;
      render();
      const amb = ambulanceOf(u.ambulanceId); if(amb) startGeoWatch(amb);
      toast('Connexion autorisée — vous êtes connecté(e).');
      return;
    }
    if(req.status==='denied'){
      stopHandoffPolling();
      u.handoffRequest=null; await saveKey('users');
      toast("Connexion refusée par l'appareil déjà connecté.");
      HANDOFF_WAITING=null; render(); return;
    }
    if(Date.now()-HANDOFF_WAITING.startedAt > HANDOFF_TIMEOUT_MS){
      stopHandoffPolling();
      if(u.handoffRequest && u.handoffRequest.requestId===HANDOFF_WAITING.requestId) u.handoffRequest=null;
      await saveKey('users');
      toast('Pas de réponse — réessayez plus tard.');
      HANDOFF_WAITING=null; render(); return;
    }
    const txt = document.getElementById('handoffStatusText');
    if(txt) txt.textContent = 'En attente de réponse… ('+Math.max(0,Math.round((HANDOFF_TIMEOUT_MS-(Date.now()-HANDOFF_WAITING.startedAt))/1000))+' s)';
  }, 3000);
}
function stopHandoffPolling(){ if(HANDOFF_POLL_TIMER){ clearInterval(HANDOFF_POLL_TIMER); HANDOFF_POLL_TIMER=null; } }
function renderHandoffIncoming(){
  return `
  <div class="card" style="border-color:var(--red); background:var(--red-pale);">
    <div class="flexbetween">
      <div>
        <strong>⚠ Un autre appareil demande à se connecter à votre compte.</strong>
        <div class="muted small">Passation de poste : si vous autorisez, vous serez déconnecté(e) de cet appareil.</div>
      </div>
      <div>
        <button class="btn primary small" id="handoffApproveBtn">Autoriser</button>
        <button class="btn danger small" id="handoffDenyBtn">Refuser</button>
      </div>
    </div>
  </div>`;
}

    <h3>Mon compte</h3>
    <p class="muted small">${roleLabel}${u.centreId?' · '+esc(centreOf(u.centreId)?.nom||''):''}${u.ambulanceId?' · '+esc(ambulanceOf(u.ambulanceId)?.nom||''):''}${u.commune?' · '+esc(u.commune):''}</p>

    <label>Nom affiché</label>

    <label>Identifiant de connexion</label>
    <input type="text" id="mcLogin" value="${esc(u.identifiant)}">
    <div class="hint">Utilisé pour se connecter à la place de "${esc(u.identifiant)}" si vous le changez.</div>
    <label>Téléphone</label>
    <input type="text" id="mcTel" value="${esc(u.telephone||'')}">
    <label>Nouveau mot de passe</label>
    <input type="text" id="mcPw" placeholder="laisser vide pour ne pas changer">
    <div id="mcErr" class="muted" style="color:var(--red); display:none; margin-bottom:8px;"></div>

  </div>`;
}
function attachMonCompteEvents(u){
  const btn = document.getElementById('mcSaveBtn');
  if(btn) btn.onclick = async ()=>{
    const nom = document.getElementById('mcNom').value.trim();
    const login = document.getElementById('mcLogin').value.trim();
    const tel = document.getElementById('mcTel').value.trim();
    const pw = document.getElementById('mcPw').value.trim();
    const err = document.getElementById('mcErr');
    if(!nom || !login){ err.style.display='block'; err.textContent='Le nom et l\u2019identifiant sont obligatoires.'; return; }
    const conflict = DB.users.some(x=>x.id!==u.id && x.identifiant.toLowerCase()===login.toLowerCase());
    if(conflict){ err.style.display='block'; err.textContent='Cet identifiant est déjà utilisé par un autre compte.'; return; }
    u.nom = nom; u.identifiant = login; u.telephone = tel;
    if(pw) u.motDePasse = pw;
    await saveKey('users');
    toast('Compte mis à jour.');
    SHOW_ACCOUNT = false;
    render();
  };
}


function renderBody(u){
  if(u.role==='agent') return renderAgent(u);
  if(u.role==='chef_poste') return renderChefPoste(u);
  if(u.role==='raf') return renderRAF(u);
  if(u.role==='ambulancier') return renderAmbulancier(u);
  if(u.role==='gestionnaire') return renderGestionnaire(u);
  if(u.role==='admin') return renderAdmin(u);
  return '<p>Rôle inconnu.</p>';
}

/* ============================================================
   VUE AGENT DE SANTE
   ============================================================ */
function renderAgent(u){
  const centre = centreOf(u.centreId);
  const tabs = ['Ambulances disponibles','Mes courses'];
  const active = SUBVIEW || tabs[0];
  let body='';
  if(active===tabs[0]) body = renderAgentAmbulances(u, centre);
  else body = renderAgentCourses(u, centre);

  return `
  <div class="card" style="background:var(--teal-pale); border-color:var(--teal);">
    <div class="flexbetween">
      <div>
        <strong>${esc(centre?.nom||'Centre inconnu')}</strong>
        <div class="muted small">${esc(centre?.arrondissement||'')} · ${esc(centre?.commune||'')}</div>
      </div>
      <div>
        ${centre?.lat ? `<span class="badge ok">Position GPS enregistrée</span>` : `<span class="badge bad">Position GPS non définie par l'administrateur</span>`}
      </div>
    </div>
    <p class="hint">La position GPS de ce centre est désormais définie uniquement par l'administrateur principal (onglet Centres &amp; GPS) — elle sert de référence pour autoriser l'appel d'une ambulance depuis le centre.</p>
  </div>
  <div class="tabs">
    ${tabs.map(t=>`<div class="tab ${t===active?'active':''}" data-tab="${esc(t)}">${esc(t)}</div>`).join('')}
  </div>
  ${body}`;
}

function renderAgentAmbulances(u, centre){
  const list = DB.ambulances.map(a=>{
    const d = (centre?.lat!=null && a.lat!=null) ? haversine(centre.lat,centre.lng,a.lat,a.lng) : null;
    return {...a, dist:d};
  }).sort((x,y)=>{
    if(x.dist==null && y.dist==null) return 0;
    if(x.dist==null) return 1; if(y.dist==null) return -1;
    return x.dist-y.dist;
  });
  const statusBadge = s => ({
    disponible:'<span class="badge ok">Disponible</span>',
    en_mission:'<span class="badge warn">En mission</span>',
    en_retour:'<span class="badge mute">Retour au garage</span>',
    en_panne:'<span class="badge bad">En panne</span>'
  }[s] || `<span class="badge">${esc(s)}</span>`);

  const pendingForCentre = DB.appels.filter(a=>a.centreId===centre?.id && a.statut==='en_attente');

  return `
  ${!centre?.lat ? `<div class="card" style="border-color:var(--amber); background:var(--amber-pale);"><strong>Position GPS du centre non définie.</strong><p class="muted small" style="margin:4px 0 0;">Les distances ne pourront pas être calculées tant que la position du centre n'est pas enregistrée (bouton ci-dessus, à faire une fois depuis le centre).</p></div>` : ''}
  ${pendingForCentre.length ? `<div class="card" style="border-color:var(--amber);"><strong>Appel(s) en attente de prise en charge :</strong> ${pendingForCentre.length}. L'ambulancier sollicité recevra une notification à sa prochaine connexion / actualisation.</div>` : ''}
  <div class="mapbox" id="agentMap"></div>
  <div class="card">
    <h3>Ambulances — triées par distance</h3>
    <table>
      <tr><th>Ambulance</th><th>Statut</th><th>Distance</th><th>Course en cours</th><th></th></tr>
      ${list.map(a=>{
        const courseActive = DB.courses.find(c=>c.id===a.coursActuelle);
        const pourCentre = courseActive ? (centreOf(courseActive.centreId)?.nom || 'retour à vide') : '—';
        const dejaAppelePourCeCentre = DB.appels.some(ap=>ap.ambulanceId===a.id && ap.centreId===centre?.id && ap.statut==='en_attente');
        return `<tr>
          <td><strong>${esc(a.nom)}</strong><div class="muted small">${esc(a.telephone||'tél. non renseigné')}</div></td>
          <td>${statusBadge(a.statut)}</td>
          <td>${a.dist!=null ? a.dist.toFixed(1)+' km' : '—'}</td>
          <td class="small">${esc(pourCentre)}</td>
          <td>
            ${a.statut==='disponible' && centre ?
              (dejaAppelePourCeCentre ? `<span class="muted small">Appel envoyé</span>` : `<button class="btn small primary" data-call-amb="${a.id}">Appeler</button>`)
              : `<button class="btn small" disabled>Indisponible</button>`}
          </td>
        </tr>`;
      }).join('')}
    </table>
  </div>`;
}

function renderAgentCourses(u, centre){
  const mine = DB.courses.filter(c=>c.centreId===centre?.id).sort((a,b)=>new Date(b.heureDebut)-new Date(a.heureDebut));
  return `
  <div class="card">
    <h3>Historique des courses pour ${esc(centre?.nom||'')}</h3>
    ${mine.length===0 ? '<p class="muted">Aucune course enregistrée pour le moment.</p>' : `
    <table>
      <tr><th>Ambulance</th><th>Début</th><th>Fin</th><th>Statut</th><th>Distance</th></tr>
      ${mine.map(c=>`<tr>
        <td>${esc(ambulanceOf(c.ambulanceId)?.nom||'?')}</td>
        <td class="small">${fmtDT(c.heureDebut)}</td>
        <td class="small">${fmtDT(c.heureFin)}</td>
        <td>${courseStatutBadge(c.statut)}</td>
        <td>${c.distanceKm!=null ? c.distanceKm.toFixed(1)+' km' : '—'}</td>
      </tr>`).join('')}
    </table>`}
  </div>`;
}
function courseStatutBadge(s){
  return {
    en_cours:'<span class="badge warn">En cours</span>',
    terminee:'<span class="badge ok">Terminée</span>',
    interrompue:'<span class="badge bad">Interrompue</span>'
  }[s] || s;
}

/* ============================================================
   VUE CHEF DE POSTE (versement + quittance — recette verrouillée, saisie par le RAF)
   ============================================================ */
function renderChefPoste(u){
  const centre = centreOf(u.centreId);
  const mois = curMonth();
  const key = centre?.id+'_'+mois;
  const f = DB.finances[key] || {};
  const taux = DB.settings.taux3pct ?? 0.03;
  const recetteSaisie = f.recette!=null;
  const montant3pct = (f.recette||0) * taux;
  const ecart = (f.montantVerseDeclare||0) - montant3pct;
  const valide = !!(f.quittanceBase64 && f.montantVerseDeclare);
  return `
  <div class="card" style="background:var(--teal-pale); border-color:var(--teal);">
    <strong>${esc(centre?.nom||'Centre inconnu')}</strong>
    <div class="muted small">${esc(centre?.arrondissement||'')} · ${esc(centre?.commune||'')}</div>
  </div>
  <div class="card">
    <h3>Versement du mois — ${esc(mois)}</h3>
    <label>Recette du centre (saisie par le RAF de la commune)</label>
    <input type="text" value="${recetteSaisie ? money(f.recette) : ''}" placeholder="Pas encore saisie par le RAF" disabled>
    ${!recetteSaisie ? `<p class="hint">Le versement ne peut pas être enregistré tant que le RAF de votre commune n'a pas saisi la recette du mois.</p>` : ''}
    <div class="grid cols-2">
      <div><label>Montant versé au compte système de référence (FCFA)</label><input type="number" id="finVerse" value="${f.montantVerseDeclare||''}" placeholder="0" ${!recetteSaisie?'disabled':''}></div>
      <div><label>Date de versement</label><input type="date" id="finDate" value="${f.dateVersement||''}" ${!recetteSaisie?'disabled':''}></div>
    </div>
    <label>Quittance (photo ou scan) — obligatoire pour valider le versement</label>
    <input type="file" id="finQuittance" accept="image/*" ${!recetteSaisie?'disabled':''}>
    ${f.quittanceBase64 ? `<img src="${f.quittanceBase64}" class="imgprev">` : ''}
    <div class="divider"></div>
    <div class="grid cols-3">
      <div class="card" style="margin:0;"><div class="muted small">3% attendu (${(taux*100).toFixed(0)}% de la recette)</div><div style="font-size:20px; font-weight:600;">${money(montant3pct)}</div></div>
      <div class="card" style="margin:0;"><div class="muted small">Versé déclaré</div><div style="font-size:20px; font-weight:600;">${money(f.montantVerseDeclare||0)}</div></div>
      <div class="card" style="margin:0;"><div class="muted small">Statut</div><div style="font-size:14px; font-weight:600;">${valide?'<span class="badge ok">Validé</span>':'<span class="badge bad">Non validé — quittance requise</span>'}</div></div>
    </div>
    <button class="btn primary" id="saveVersementBtn" style="margin-top:8px;" ${!recetteSaisie?'disabled':''}>Enregistrer le versement</button>
  </div>
  <div class="card">
    <h3>Historique des mois précédents</h3>
    ${Object.keys(DB.finances).filter(k=>k.startsWith(centre?.id+'_') && !k.endsWith('_'+mois)).sort().reverse().map(k=>{
      const m = k.split('_')[1]; const d = DB.finances[k];
      const m3 = (d.recette||0)*taux;
      const v = !!(d.quittanceBase64 && d.montantVerseDeclare);
      return `<div class="row"><span>${m}</span><span class="small">Recette : ${money(d.recette)} · 3% attendu : ${money(m3)} · Versé : ${money(d.montantVerseDeclare)} ${v?'<span class="badge ok">Validé</span>':'<span class="badge bad">Non validé</span>'}</span></div>`;
    }).join('') || '<p class="muted">Aucun historique.</p>'}
  </div>`;
}

/* ============================================================
   VUE RAF (saisie de la recette — uniquement les centres de sa commune)
   ============================================================ */
function renderRAF(u){
  const mois = curMonth();
  const centres = DB.centres.filter(c=>c.commune===u.commune);
  const historique = Object.keys(DB.finances).filter(k=>{
    const cid = k.split('_')[0];
    const c = DB.centres.find(x=>x.id===cid);
    return c && c.commune===u.commune && !k.endsWith('_'+mois);
  }).sort().reverse().slice(0,80);
  const taux = DB.settings.taux3pct ?? 0.03;
  return `
  <div class="card" style="background:var(--teal-pale); border-color:var(--teal);">
    <strong>RAF — ${esc(u.commune||'commune non définie')}</strong>
    <div class="muted small">Vous ne voyez et ne saisissez que les centres de votre commune.</div>
  </div>
  <div class="card">
    <h3>Recettes du mois — ${esc(mois)}</h3>
    ${centres.length===0?'<p class="muted">Aucun centre rattaché à cette commune.</p>':`
    <table>
      <tr><th>Centre</th><th>Recette (FCFA)</th><th></th></tr>
      ${centres.map(c=>{
        const key = c.id+'_'+mois;
        const f = DB.finances[key] || {};
        return `<tr>
          <td>${esc(c.nom)}</td>
          <td><input type="number" class="raf-recette-input" data-centre="${c.id}" value="${f.recette??''}" placeholder="0" style="margin-bottom:0;"></td>

function renderAmbDashboard(u, amb){
  const pending = DB.appels.filter(a=>a.ambulanceId===amb?.id && a.statut==='en_attente');
  const courseActive = DB.courses.find(c=>c.id===amb?.coursActuelle);
  const statusOptions = ['disponible','en_mission','en_retour','en_panne'];
  const statusLabels = {disponible:'Disponible',en_mission:'En mission',en_retour:'Retour au garage',en_panne:'En panne'};

  return `
  <div class="card">
    <div class="flexbetween">
      <div>
        <h3 style="margin:0;">${esc(amb?.nom||'')}</h3>
        <div class="muted small">${esc(amb?.telephone||'téléphone non renseigné')}</div>
      </div>
      <div>
        <label style="margin:0 0 2px;">Statut</label>
        <select id="ambStatut" ${courseActive?'disabled title="Statut lié à la course en cours"':''}>
          ${statusOptions.map(s=>`<option value="${s}" ${amb?.statut===s?'selected':''}>${statusLabels[s]}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="divider"></div>
    <div class="flexbetween">
      <div>
        <span class="muted small">Partage de position GPS</span><br>
        <span id="geoState" class="badge ${GEO_WATCH_ID?'ok':'bad'}">${GEO_WATCH_ID?'Actif':'Inactif'}</span>
      </div>
      <button class="btn ${GEO_WATCH_ID?'danger':'primary'}" id="geoToggleBtn">${GEO_WATCH_ID?'Arrêter le partage':'Démarrer le partage de ma position'}</button>
    </div>
    <p class="hint">Le partage doit rester actif pendant les déplacements pour permettre le calcul de la distance et informer les centres.</p>
  </div>

  ${pending.length? `<div class="card" style="border-color:var(--amber);">
    <h3>Appels en attente</h3>
    ${pending.map(p=>{
      const c = centreOf(p.centreId);
      const d = (amb?.lat!=null && c?.lat!=null) ? haversine(amb.lat,amb.lng,c.lat,c.lng) : null;
      return `<div class="row">
        <div><strong>${esc(c?.nom)}</strong><div class="muted small">${esc(c?.arrondissement)} · appel reçu ${fmtDT(p.heure)} ${d!=null?'· ~'+d.toFixed(1)+' km':''}</div></div>
        <div><button class="btn small primary" data-accept-call="${p.id}">Accepter</button> <button class="btn small" data-decline-call="${p.id}">Refuser</button></div>
      </div>`;
    }).join('')}
  </div>` : ''}

  <div class="mapbox" id="ambMap"></div>

  ${courseActive ? `
  <div class="card" style="border-color:var(--teal);">
    <h3>Course en cours ${courseActive.centreId? '— pour '+esc(centreOf(courseActive.centreId)?.nom) : '— retour au garage'}</h3>
    <p class="muted small">Départ : ${fmtDT(courseActive.heureDebut)} ${courseActive.heureArriveeCentre?(' · Arrivé au centre : '+fmtDT(courseActive.heureArriveeCentre)):''}</p>
    <div class="pillrow">
      ${courseActive.centreId && !courseActive.heureArriveeCentre ? `<button class="btn small" id="arriveCentreBtn">Je suis arrivé au centre demandeur</button>` : ''}
      ${courseActive.centreId ? `<button class="btn small primary" id="endMissionBtn">Patient admis au centre de référence / mission terminée</button>` : `<button class="btn small primary" id="endRetourBtn">Arrivé au garage — terminer le retour</button>`}
    </div>
  </div>` : `
  <div class="card">
    <p class="muted">Aucune course en cours. ${amb?.statut==='disponible' ? "Vous recevrez ici les appels des centres." : ''}</p>
    ${amb && amb.statut!=='disponible' && amb.statut!=='en_panne' ? `<button class="btn small" id="startRetourBtn">Démarrer un trajet de retour au garage</button>` : ''}
  </div>`}
  `;
}

/* ============================================================
   VUE GESTIONNAIRE MATIERES
   ============================================================ */
let GEST_MOIS = null;
let GEST_AMB = null;
function renderGestionnaire(u){
  const mois = GEST_MOIS || curMonth();
  const ambSel = GEST_AMB || (DB.ambulances[0]?.id||'');
  const depensesVehicule = DB.depenses.filter(d=>d.ambulanceId===ambSel && d.mois===mois);
  const total = depensesVehicule.reduce((s,d)=>s+Number(d.montant||0),0);

  const coursesDuMois = DB.courses.filter(c=>c.ambulanceId===ambSel && c.centreId && fmtMonth(c.heureDebut)===mois && (c.statut==='terminee'||c.statut==='interrompue'));
  const parCentre = {};
  coursesDuMois.forEach(c=>{ parCentre[c.centreId] = (parCentre[c.centreId]||0) + 1; });
  const totalCourses = Object.values(parCentre).reduce((a,b)=>a+b,0);

  return `
  <div class="card">
    <h3>Dépenses matières par véhicule</h3>
    <div class="grid cols-2">
      <div><label>Véhicule</label><select id="gestAmbSel">
        ${DB.ambulances.map(a=>`<option value="${a.id}" ${a.id===ambSel?'selected':''}>${esc(a.nom)}</option>`).join('')}
      </select></div>
      <div><label>Mois</label><input type="month" id="gestMoisSel" value="${mois}"></div>
    </div>
    <div class="divider"></div>
    <div class="grid cols-3">
      <div><label>Date</label><input type="date" id="depDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label>Montant (FCFA)</label><input type="number" id="depMontant" placeholder="0"></div>
      <div><label>Description</label><input type="text" id="depDesc" placeholder="carburant, pièce, entretien..."></div>
    </div>
    <button class="btn primary" id="addDepBtn">Ajouter la dépense</button>
    <div class="divider"></div>
    <table>
      <tr><th>Date</th><th>Description</th><th>Montant</th><th></th></tr>
      ${depensesVehicule.map(d=>`<tr><td>${d.date}</td><td>${esc(d.description)}</td><td>${money(d.montant)}</td><td><button class="btn small danger" data-del-dep="${d.id}">Supprimer</button></td></tr>`).join('') || '<tr><td colspan="4" class="muted">Aucune dépense ce mois pour ce véhicule.</td></tr>'}
    </table>
    <p style="text-align:right; font-weight:600;">Total du mois : ${money(total)}</p>
  </div>

  <div class="card">
    <h3>Répartition entre centres — part de sollicitation</h3>
    <p class="muted small">Répartition du total des dépenses au prorata du nombre de courses effectuées ce mois-ci pour chaque centre (${totalCourses} course(s) comptabilisée(s)).</p>
    ${totalCourses===0 ? '<p class="muted">Aucune course terminée ce mois pour ce véhicule — pas de répartition possible.</p>' : `
    <table>
      <tr><th>Centre</th><th>Courses</th><th>Part</th><th>Montant attribué</th></tr>
      ${Object.entries(parCentre).sort((a,b)=>b[1]-a[1]).map(([cid,n])=>{
        const part = n/totalCourses;
        return `<tr><td>${esc(centreOf(cid)?.nom)}</td><td>${n}</td><td>${(part*100).toFixed(0)}%</td><td>${money(total*part)}</td></tr>`;
      }).join('')}
    </table>`}
  </div>`;
}

/* ============================================================
   VUE ADMIN
   ============================================================ */
function renderAdmin(u){
  const tabs = ['Tableau de bord','Utilisateurs & mots de passe','Ambulances','Centres & GPS','Finances (vue globale)','Paramètres'];
  const active = SUBVIEW || tabs[0];
  let body='';
  if(active===tabs[0]) body = renderAdminDashboard();
  else if(active===tabs[1]) body = renderAdminUsers();
  else if(active===tabs[2]) body = renderAdminAmbulances();
  else if(active===tabs[3]) body = renderAdminCentres();
  else if(active===tabs[4]) body = renderAdminFinances();
  else body = renderAdminSettings();
  return `<div class="tabs">${tabs.map(t=>`<div class="tab ${t===active?'active':''}" data-tab="${esc(t)}">${esc(t)}</div>`).join('')}</div>${body}`;
}

function renderAdminDashboard(){
  const mois = curMonth();
  const now = Date.now();
  const alarmed = DB.ambulances.filter(a=>a.statut==='en_mission' && a.statutDepuis && (now-new Date(a.statutDepuis).getTime())>AMB_ALARM_MS);

  const centreRows = DB.centres.map(c=>{
    const f = DB.finances[c.id+'_'+mois] || {};
    const attendu = (f.recette||0)*(DB.settings.taux3pct||0.03);
    const nbAppels = DB.appels.filter(a=>a.centreId===c.id).length;
    const nbAppelsMois = DB.appels.filter(a=>a.centreId===c.id && fmtMonth(a.heure)===mois).length;
    return {c, f, attendu, nbAppels, nbAppelsMois};
  }).filter(r=>r.nbAppels>0 || r.f.recette);

  const registre = [...DB.appels].sort((a,b)=>new Date(b.heure)-new Date(a.heure)).slice(0,100);

  return `
  <div class="card" ${!ADMIN_ALERTS_ENABLED?'style="border-color:var(--amber);"':''}>
    <div class="flexbetween">
      <div>
        <h3 style="margin:0;">Alertes sonores</h3>

      </div>
      ${!ADMIN_ALERTS_ENABLED
        ? `<button class="btn primary" id="enableAdminAlertsBtn">Activer les alertes sonores</button>`
        : `<button class="btn" id="testAdminAlertsBtn">Tester le son</button>`}
    </div>
  </div>

  ${alarmed.length ? `<div class="card" style="border-color:var(--red); background:var(--red-pale);">
    <strong>⚠ ${alarmed.length} ambulance(s) en mission depuis plus d'1h :</strong>
    ${alarmed.map(a=>`<div class="row"><span>${esc(a.nom)}</span><span class="small">depuis ${fmtDT(a.statutDepuis)}</span></div>`).join('')}
  </div>` : ''}

  <div class="mapbox" id="adminMap"></div>

  <div class="card">
    <h3>Ambulances — position &amp; statut</h3>
    <table>
      <tr><th>Ambulance</th><th>Statut</th><th>Depuis</th><th>Position GPS</th><th>Dernière mise à jour</th></tr>
      ${DB.ambulances.map(a=>`<tr>
        <td><strong>${esc(a.nom)}</strong></td>
        <td>${ambStatusBadge(a.statut)}</td>
        <td class="small">${a.statutDepuis?fmtDT(a.statutDepuis):'—'}</td>
        <td class="small">${a.lat!=null?a.lat.toFixed(4)+', '+a.lng.toFixed(4):'<span class="muted">non disponible</span>'}</td>
        <td class="small">${a.lastUpdate?fmtDT(a.lastUpdate):'—'}</td>
      </tr>`).join('')}
    </table>
  </div>

  <div class="card">
    <h3>Sollicitations par centre — ${esc(mois)}</h3>
    ${centreRows.length===0?'<p class="muted">Aucune donnée ce mois.</p>':`
    <table>
      <tr><th>Centre</th><th>Appels ce mois</th><th>Appels (total)</th><th>Recette</th><th>3% attendu</th><th>Versé déclaré</th><th>Écart</th></tr>
      ${centreRows.map(r=>{
        const ecart=(r.f.montantVerseDeclare||0)-r.attendu;
        return `<tr><td>${esc(r.c.nom)}</td><td>${r.nbAppelsMois}</td><td>${r.nbAppels}</td><td>${money(r.f.recette)}</td><td>${money(r.attendu)}</td><td>${money(r.f.montantVerseDeclare)}</td><td style="color:${ecart<0?'var(--red)':'var(--green)'};">${money(ecart)}</td></tr>`;
      }).join('')}
    </table>`}
  </div>

  <div class="card">
    <h3>Registre d'appels (100 derniers)</h3>
    ${registre.length===0?'<p class="muted">Aucun appel enregistré.</p>':`
    <table>
      <tr><th>Heure</th><th>Centre</th><th>Ambulance sollicitée</th><th>Statut</th></tr>
      ${registre.map(a=>`<tr>
        <td class="small">${fmtDT(a.heure)}</td>
        <td>${esc(centreOf(a.centreId)?.nom||'?')}</td>
        <td>${esc(ambulanceOf(a.ambulanceId)?.nom||'?')}</td>
        <td>${appelStatutBadge(a.statut)}</td>
      </tr>`).join('')}
    </table>`}
  </div>`;
}

function exportDatabaseToExcel(){
  const wb = XLSX.utils.book_new();
  const centresRows = DB.centres.map(c=>({id:c.id, nom:c.nom, commune:c.commune, arrondissement:c.arrondissement, type:c.type, reference:c.reference?'Oui':'Non', lat:c.lat, lng:c.lng}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(centresRows), 'Centres');

  const ambRows = DB.ambulances.map(a=>({id:a.id, nom:a.nom, conducteur:a.conducteur, telephone:a.telephone, statut:a.statut, consommation_L_100km:a.consommation, garage:centreOf(a.garageCentreId)?.nom||'', lat:a.lat, lng:a.lng, derniere_maj:a.lastUpdate}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ambRows), 'Ambulances');

  const userRows = DB.users.map(us=>({id:us.id, nom:us.nom, role:us.role, identifiant:us.identifiant, mot_de_passe:us.motDePasse, telephone:us.telephone, centre:us.centreId?centreOf(us.centreId)?.nom:'', ambulance:us.ambulanceId?ambulanceOf(us.ambulanceId)?.nom:''}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(userRows), 'Comptes');

  const courseRows = DB.courses.map(c=>({id:c.id, ambulance:ambulanceOf(c.ambulanceId)?.nom||'', centre:c.centreId?centreOf(c.centreId)?.nom:'Retour à vide', statut:c.statut, debut:c.heureDebut, arrivee_centre:c.heureArriveeCentre, fin:c.heureFin, distance_km:c.distanceKm, carburant_L:c.carburantL}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(courseRows), 'Courses');

  const appelRows = DB.appels.map(a=>({id:a.id, centre:centreOf(a.centreId)?.nom||'', ambulance:ambulanceOf(a.ambulanceId)?.nom||'', heure:a.heure, statut:a.statut}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(appelRows), 'Appels');

  const finRows = Object.entries(DB.finances).map(([k,f])=>{
    const [centreId,mois] = k.split('_');
    return {centre:centreOf(centreId)?.nom||centreId, mois, recette:f.recette, montant_3pct_calcule:(f.recette||0)*(DB.settings.taux3pct||0.03), montant_verse_declare:f.montantVerseDeclare, date_versement:f.dateVersement, quittance_jointe: f.quittanceBase64?'Oui':'Non'};
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finRows), 'Finances');

  const depRows = DB.depenses.map(d=>({id:d.id, ambulance:ambulanceOf(d.ambulanceId)?.nom||'', mois:d.mois, date:d.date, montant:d.montant, description:d.description}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(depRows), 'Depenses');

  XLSX.writeFile(wb, 'Reference_DAA_export_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function attachBodyEvents(u){
  const logout = document.getElementById('logoutBtn');
  if(logout) logout.onclick = async ()=>{
    stopGeoWatch();
    if(SESSION && SESSION.role==='ambulancier'){
      const cu = currentUser();
      if(cu && cu.sessionToken===MY_SESSION_TOKEN){
        cu.sessionToken = null; cu.sessionLastSeen = null; cu.handoffRequest = null;
        await saveKey('users');
      }
    }
    MY_SESSION_TOKEN = null; INCOMING_HANDOFF = null;
    SESSION=null; VIEW='login'; SUBVIEW=null; SHOW_ACCOUNT=false; render();
  };

  const approveBtn = document.getElementById('handoffApproveBtn');
  if(approveBtn) approveBtn.onclick = async ()=>{
    stopGeoWatch();
    const cu = currentUser();
    if(cu){
      cu.handoffRequest = cu.handoffRequest ? {...cu.handoffRequest, status:'approved'} : {status:'approved'};
      cu.sessionToken = null; cu.sessionLastSeen = null;
      await saveKey('users');
    }
    INCOMING_HANDOFF = null; MY_SESSION_TOKEN = null;
    SESSION=null; VIEW='login'; SUBVIEW=null; SHOW_ACCOUNT=false;
    toast('Vous avez autorisé la connexion sur un autre appareil. Vous êtes déconnecté(e).');
    render();
  };
  const denyBtn = document.getElementById('handoffDenyBtn');
  if(denyBtn) denyBtn.onclick = async ()=>{
    const cu = currentUser();
    if(cu){
      cu.handoffRequest = cu.handoffRequest ? {...cu.handoffRequest, status:'denied'} : {status:'denied'};
      await saveKey('users');
    }
    INCOMING_HANDOFF = null;
    toast('Demande refusée.');
    render();
  };

  const mcBtn = document.getElementById('monCompteBtn');
  if(mcBtn) mcBtn.onclick = ()=>{ SHOW_ACCOUNT = !SHOW_ACCOUNT; render(); };

  if(SHOW_ACCOUNT) return; // le panneau "Mon compte" n'a pas d'onglets ni de carte à initialiser

  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.onclick = ()=>{ SUBVIEW = el.getAttribute('data-tab'); render(); };
  });

  if(u.role==='agent') attachAgentEvents(u);
  if(u.role==='chef_poste') attachChefPosteEvents(u);
  if(u.role==='raf') attachRAFEvents(u);
  if(u.role==='ambulancier') attachAmbEvents(u);
  if(u.role==='gestionnaire') attachGestEvents(u);
  if(u.role==='admin') attachAdminEvents(u);

  initMaps(u);
}

/* ---- AGENT events ---- */
function attachAgentEvents(u){
  const centre = centreOf(u.centreId);

  document.querySelectorAll('[data-call-amb]').forEach(btn=>{
    btn.onclick = ()=>{
      const ambId = btn.getAttribute('data-call-amb');
      if(!centre?.lat){
        toast("La position GPS du centre n'est pas encore définie par l'administrateur — impossible de vérifier votre présence sur place, donc impossible d'appeler.");
        return;
      }
      if(!navigator.geolocation){
        toast('Géolocalisation non disponible sur cet appareil — impossible de vérifier votre présence sur place.');
        return;
      }
      const originalLabel = btn.textContent;
      btn.disabled = true; btn.textContent = 'Vérification de la position…';
      navigator.geolocation.getCurrentPosition(async pos=>{
        const check = withinCentreGeofence(centre, pos.coords.latitude, pos.coords.longitude);
        if(!check.ok){
          btn.disabled = false; btn.textContent = originalLabel;
          toast("Appel impossible : vous êtes à environ "+Math.round(check.distM)+" m du centre (10 m maximum autorisés). L'appel ne peut se faire que depuis le centre de santé.");
          return;
        }
        DB.appels.push({id:uid(), centreId:centre.id, ambulanceId:ambId, heure:nowISO(), statut:'en_attente'});
        await saveKey('appels');
        toast("Appel envoyé à l'ambulancier.");
        render();
      }, err=>{
        btn.disabled = false; btn.textContent = originalLabel;
        toast("Impossible de vérifier votre position (\u201c"+err.message+"\u201d) — l'appel nécessite d'être localisé au centre.");
      }, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
    };
  });
}

const SHEET_CELL_LIMIT = 45000; // marge sous la limite Google Sheets de 50 000 caractères/cellule
function fileToCompressedBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const attempts = [[700,0.55],[500,0.4],[380,0.3],[280,0.22]];
        let result = null;
        for(const [maxW, quality] of attempts){
          const scale = Math.min(1, maxW/img.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(img.width*scale));
          canvas.height = Math.max(1, Math.round(img.height*scale));
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          if(dataUrl.length <= SHEET_CELL_LIMIT){ result = dataUrl; break; }
          result = dataUrl; // garde la plus compressée en dernier recours
        }
        if(result.length > SHEET_CELL_LIMIT){
          toast("La photo reste trop volumineuse même compressée — reprenez-la avec un cadrage plus serré ou une meilleure luminosité.");
        }
        resolve(result);
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---- AMBULANCIER events ---- */
function startGeoWatch(amb){
  if(!navigator.geolocation){ toast('Géolocalisation non disponible.'); return; }
  GEO_WATCH_ID = navigator.geolocation.watchPosition(async pos=>{
    amb.lat = pos.coords.latitude; amb.lng = pos.coords.longitude; amb.lastUpdate = nowISO();
    const course = DB.courses.find(c=>c.id===amb.coursActuelle);
    if(course && course.statut==='en_cours'){
      course.positions = course.positions || [];
      const last = course.positions[course.positions.length-1];
      if(!last || haversine(last.lat,last.lng,amb.lat,amb.lng) > 0.03){
        course.positions.push({lat:amb.lat,lng:amb.lng,t:nowISO()});
      }
    }
    await saveKey('ambulances'); if(course) await saveKey('courses');
  }, err=>{ toast('Position indisponible : '+err.message); }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}
function stopGeoWatch(){ if(GEO_WATCH_ID!=null){ navigator.geolocation.clearWatch(GEO_WATCH_ID); GEO_WATCH_ID=null; } }

function courseDistance(course){
  const pts = course.positions||[];
  let d=0; for(let i=1;i<pts.length;i++){ const h=haversine(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng); if(h) d+=h; }
  return d;
}

function attachAmbEvents(u){
  const amb = ambulanceOf(u.ambulanceId);
  const geoBtn = document.getElementById('geoToggleBtn');
  if(geoBtn) geoBtn.onclick = ()=>{
    if(GEO_WATCH_ID){ stopGeoWatch(); } else { startGeoWatch(amb); }
    render();
  };
  const statSel = document.getElementById('ambStatut');
  if(statSel) statSel.onchange = async ()=>{ if(amb.statut!==statSel.value) amb.statutDepuis = nowISO(); amb.statut = statSel.value; await saveKey('ambulances'); toast('Statut mis à jour.'); render(); };

  document.querySelectorAll('[data-accept-call]').forEach(btn=>{
    btn.onclick = async ()=>{
      const callId = btn.getAttribute('data-accept-call');
      const call = DB.appels.find(a=>a.id===callId);
      if(!call) return;
      const current = DB.courses.find(c=>c.id===amb.coursActuelle && c.statut==='en_cours');
      if(current){
        current.statut = 'interrompue';
        current.heureFin = nowISO();
        current.distanceKm = courseDistance(current);
        current.carburantL = current.distanceKm * (amb.consommation/100);
      }
      const newCourse = {
        id:uid(), ambulanceId:amb.id, centreId:call.centreId, statut:'en_cours',
        heureDebut:nowISO(), heureArriveeCentre:null, heureFin:null,
        positions: amb.lat!=null?[{lat:amb.lat,lng:amb.lng,t:nowISO()}]:[],
        distanceKm:null, carburantL:null
      };
      DB.courses.push(newCourse);
      amb.coursActuelle = newCourse.id;
      amb.statut = 'en_mission'; amb.statutDepuis = nowISO();
      call.statut = 'acceptee';
      DB.appels.filter(a=>a.ambulanceId===amb.id && a.statut==='en_attente' && a.id!==callId).forEach(a=>a.statut='refusee');
      await saveKey('courses'); await saveKey('ambulances'); await saveKey('appels');
      toast('Course démarrée pour '+ (centreOf(call.centreId)?.nom||'') );
      render();
    };
  });
  document.querySelectorAll('[data-decline-call]').forEach(btn=>{
    btn.onclick = async ()=>{
      const call = DB.appels.find(a=>a.id===btn.getAttribute('data-decline-call'));
      if(call){ call.statut='refusee'; await saveKey('appels'); render(); }
    };
  });

  const arriveBtn = document.getElementById('arriveCentreBtn');
  if(arriveBtn) arriveBtn.onclick = async ()=>{
    const c = DB.courses.find(cc=>cc.id===amb.coursActuelle);
    c.heureArriveeCentre = nowISO();
    await saveKey('courses'); toast('Arrivée au centre enregistrée.'); render();
  };
  const endMissionBtn = document.getElementById('endMissionBtn');
  if(endMissionBtn) endMissionBtn.onclick = async ()=>{
    const c = DB.courses.find(cc=>cc.id===amb.coursActuelle);
    c.statut='terminee'; c.heureFin=nowISO();
    c.distanceKm = courseDistance(c); c.carburantL = c.distanceKm*(amb.consommation/100);
    amb.coursActuelle = null; amb.statut='disponible'; amb.statutDepuis=nowISO();
    await saveKey('courses'); await saveKey('ambulances');
    toast('Course terminée — '+c.distanceKm.toFixed(1)+' km, '+c.carburantL.toFixed(1)+' L estimés.');
    render();
  };
  const startRetourBtn = document.getElementById('startRetourBtn');
  if(startRetourBtn) startRetourBtn.onclick = async ()=>{
    const nc = {id:uid(), ambulanceId:amb.id, centreId:null, statut:'en_cours', heureDebut:nowISO(), heureArriveeCentre:null, heureFin:null, positions: amb.lat!=null?[{lat:amb.lat,lng:amb.lng,t:nowISO()}]:[], distanceKm:null, carburantL:null};
    DB.courses.push(nc); amb.coursActuelle = nc.id; amb.statut='en_retour'; amb.statutDepuis=nowISO();
    await saveKey('courses'); await saveKey('ambulances'); render();
  };
  const endRetourBtn = document.getElementById('endRetourBtn');
  if(endRetourBtn) endRetourBtn.onclick = async ()=>{
    const c = DB.courses.find(cc=>cc.id===amb.coursActuelle);
    c.statut='terminee'; c.heureFin=nowISO();
    c.distanceKm = courseDistance(c); c.carburantL = c.distanceKm*(amb.consommation/100);
    amb.coursActuelle=null; amb.statut='disponible'; amb.statutDepuis=nowISO();
    await saveKey('courses'); await saveKey('ambulances'); toast('Retour au garage terminé.'); render();
  };
}

    btn.onclick = ()=>{ CONFIRM_DEL_USER = null; render(); };
  });
  document.querySelectorAll('[data-del-user]').forEach(btn=>{
    btn.onclick = async ()=>{
      DB.users = DB.users.filter(x=>x.id!==btn.getAttribute('data-del-user'));
      CONFIRM_DEL_USER = null;
      await saveKey('users'); render();
    };
  });
  document.querySelectorAll('[data-edit-user]').forEach(btn=>{
    btn.onclick = ()=>{ EDIT_USER_ID = btn.getAttribute('data-edit-user'); render(); };
  });
  document.querySelectorAll('[data-cancel-edit-user]').forEach(btn=>{
    btn.onclick = ()=>{ EDIT_USER_ID = null; render(); };
  });
  document.querySelectorAll('[data-save-user]').forEach(btn=>{
    btn.onclick = async ()=>{
      const us = DB.users.find(x=>x.id===btn.getAttribute('data-save-user'));
      us.nom = document.getElementById('editUserNom').value.trim() || us.nom;
      us.identifiant = document.getElementById('editUserLogin').value.trim() || us.identifiant;
      us.motDePasse = document.getElementById('editUserPw').value.trim() || us.motDePasse;
      us.telephone = document.getElementById('editUserTel').value.trim();
      EDIT_USER_ID = null;
      await saveKey('users'); toast('Compte mis à jour.'); render();
    };
  });
  document.querySelectorAll('[data-edit-amb]').forEach(btn=>{
    btn.onclick = ()=>{ EDIT_AMB_ID = btn.getAttribute('data-edit-amb'); render(); };
  });
  document.querySelectorAll('[data-cancel-edit-amb]').forEach(btn=>{
    btn.onclick = ()=>{ EDIT_AMB_ID = null; render(); };
  });
  document.querySelectorAll('[data-save-amb]').forEach(btn=>{
    btn.onclick = async ()=>{
      const a = DB.ambulances.find(x=>x.id===btn.getAttribute('data-save-amb'));
      a.nom = document.getElementById('editAmbNom').value.trim() || a.nom;
      a.conducteur = document.getElementById('editAmbCond').value.trim();
      a.telephone = document.getElementById('editAmbTel').value.trim();
      const newStatut = document.getElementById('editAmbStatut').value;
      if(newStatut !== a.statut){ a.statut = newStatut; a.statutDepuis = nowISO(); }
      a.consommation = Number(document.getElementById('editAmbConso').value||a.consommation);
      a.garageCentreId = document.getElementById('editAmbGarage').value;
      EDIT_AMB_ID = null;
      await saveKey('ambulances'); toast('Ambulance mise à jour.'); render();
    };
  });
  document.querySelectorAll('[data-edit-centre-gps]').forEach(btn=>{
    btn.onclick = ()=>{ EDIT_CENTRE_GPS_ID = btn.getAttribute('data-edit-centre-gps'); render(); };
  });
  document.querySelectorAll('[data-cancel-edit-centre]').forEach(btn=>{
    btn.onclick = ()=>{ EDIT_CENTRE_GPS_ID = null; render(); };
  });
  document.querySelectorAll('[data-save-centre-gps]').forEach(btn=>{
    btn.onclick = async ()=>{
      const c = DB.centres.find(x=>x.id===btn.getAttribute('data-save-centre-gps'));
      const lat = parseFloat(document.getElementById('editCentreLat').value);
      const lng = parseFloat(document.getElementById('editCentreLng').value);
      if(isNaN(lat) || isNaN(lng)){ toast('Latitude/longitude invalides.'); return; }
      c.lat = lat; c.lng = lng;
      EDIT_CENTRE_GPS_ID = null;
      await saveKey('centres'); toast('Position GPS enregistrée.'); render();
    };
  });
  const addAmbBtn = document.getElementById('addAmbBtn');
  if(addAmbBtn) addAmbBtn.onclick = async ()=>{
    const nom = document.getElementById('newAmbNom').value.trim();
    if(!nom){ toast('Nom requis.'); return; }
    DB.ambulances.push({
      id:uid(), nom, telephone:document.getElementById('newAmbTel').value.trim(),
      conducteur:document.getElementById('newAmbCond').value.trim(),
      statut:'disponible', statutDepuis:nowISO(), lat:null, lng:null, lastUpdate:null,
      garageCentreId:document.getElementById('newAmbGarage').value,
      consommation:Number(document.getElementById('newAmbConso').value||12),
      coursActuelle:null
    });
    await saveKey('ambulances'); toast('Ambulance ajoutée.'); render();
  };
  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  if(saveSettingsBtn) saveSettingsBtn.onclick = async ()=>{
    DB.settings.taux3pct = Number(document.getElementById('setTaux').value||3)/100;
    DB.settings.prixCarburantLitre = Number(document.getElementById('setPrix').value||750);
    DB.settings.consoDefaut = Number(document.getElementById('setConso').value||12);
    await saveKey('settings'); toast('Paramètres enregistrés.'); render();
  };
  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick = ()=>{
    if(typeof XLSX==='undefined'){ toast("La librairie d'export n'a pas pu se charger (vérifiez la connexion)."); return; }
    exportDatabaseToExcel();
    toast('Export généré.');
  };
}

/* ================= CARTES ================= */
function initMaps(u){
  if(u.role==='admin' && document.getElementById('adminMap')){
    const map = L.map('adminMap', {scrollWheelZoom:false});
    map.setView([7.18,1.99], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
    DB.centres.forEach(c=>{ if(c.lat!=null) L.circleMarker([c.lat,c.lng],{radius:4,color:'#5B655F',fillColor:'#5B655F',fillOpacity:.5}).addTo(map).bindPopup(c.nom); });
    DB.ambulances.forEach(a=>{
      if(a.lat!=null){
        const color = a.statut==='disponible'?'#3B7A3E':(a.statut==='en_panne'?'#B23A2E':'#C97A20');
        L.circleMarker([a.lat,a.lng],{radius:8,color,fillColor:color,fillOpacity:.9}).addTo(map).bindPopup(a.nom+' — '+AMB_STATUS_LABELS[a.statut]);
      }
    });
  }
  if(u.role==='agent' && document.getElementById('agentMap')){
    const centre = centreOf(u.centreId);
    const map = L.map('agentMap', {scrollWheelZoom:false});
    const center0 = centre?.lat!=null ? [centre.lat,centre.lng] : [7.18,1.99];
    map.setView(center0, centre?.lat!=null?11:9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
    if(centre?.lat!=null) L.circleMarker([centre.lat,centre.lng],{radius:8,color:'#0E5C56',fillColor:'#0E5C56',fillOpacity:1}).addTo(map).bindPopup(centre.nom+' (votre centre)');
    DB.ambulances.forEach(a=>{
      if(a.lat!=null){
        const color = a.statut==='disponible'?'#3B7A3E':(a.statut==='en_panne'?'#B23A2E':'#C97A20');
        L.circleMarker([a.lat,a.lng],{radius:7,color,fillColor:color,fillOpacity:.9}).addTo(map).bindPopup(a.nom+' — '+a.statut);
      }
    });
  }
  if(u.role==='ambulancier' && document.getElementById('ambMap')){
    const amb = ambulanceOf(u.ambulanceId);
    const map = L.map('ambMap', {scrollWheelZoom:false});
    const center0 = amb?.lat!=null ? [amb.lat,amb.lng] : [7.18,1.99];
    map.setView(center0, amb?.lat!=null?12:9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
    if(amb?.lat!=null) L.circleMarker([amb.lat,amb.lng],{radius:8,color:'#0E5C56',fillColor:'#0E5C56',fillOpacity:1}).addTo(map).bindPopup('Vous — '+amb.nom);
    const course = DB.courses.find(c=>c.id===amb?.coursActuelle);
    if(course?.centreId){
      const c = centreOf(course.centreId);
      if(c?.lat!=null) L.circleMarker([c.lat,c.lng],{radius:8,color:'#C97A20',fillColor:'#C97A20',fillOpacity:.9}).addTo(map).bindPopup(c.nom+' (destination)');
    }
    DB.centres.forEach(c=>{ if(c.lat!=null) L.circleMarker([c.lat,c.lng],{radius:4,color:'#5B655F',fillColor:'#5B655F',fillOpacity:.5}).addTo(map).bindPopup(c.nom); });
  }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW non enregistré', e));
}
boot();
</script>
